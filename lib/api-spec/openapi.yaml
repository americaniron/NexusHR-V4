openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NexusHR VX API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: organizations
    description: Organization management
  - name: users
    description: User management
  - name: roles
    description: AI employee role catalog
  - name: employees
    description: AI employee management
  - name: interviews
    description: Interview sessions
  - name: tasks
    description: Task management
  - name: workflows
    description: Workflow management
  - name: conversations
    description: Conversations with AI employees
  - name: integrations
    description: Integration management
  - name: billing
    description: Billing and subscriptions
  - name: notifications
    description: Notifications
  - name: support
    description: Support tickets and knowledge base
  - name: dashboard
    description: Dashboard summaries
  - name: voices
    description: AI voice catalog
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: Avatars
    description: AI avatar generation and management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary metrics
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityList"

  /organizations/current:
    get:
      operationId: getCurrentOrganization
      tags: [organizations]
      summary: Get current organization
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganization"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List org users
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List AI employee roles
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: category
          in: query
          schema:
            type: string
        - name: industry
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [relevance, rating, price_asc, price_desc, newest]
      responses:
        "200":
          description: Roles list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleList"

  /roles/{id}:
    get:
      operationId: getRole
      tags: [roles]
      summary: Get role details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /roles/categories:
    get:
      operationId: getRoleCategories
      tags: [roles]
      summary: Get role categories with counts
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryList"

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List hired AI employees
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Employees list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeList"
    post:
      operationId: hireEmployee
      tags: [employees]
      summary: Hire an AI employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HireEmployee"
      responses:
        "201":
          description: Hired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get AI employee details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update AI employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployee"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deactivateEmployee
      tags: [employees]
      summary: Deactivate AI employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /interviews:
    post:
      operationId: createInterviewSession
      tags: [interviews]
      summary: Start interview session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInterview"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSession"

  /interviews/{id}:
    get:
      operationId: getInterviewSession
      tags: [interviews]
      summary: Get interview session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSession"

  /interviews/{id}/messages:
    post:
      operationId: sendInterviewMessage
      tags: [interviews]
      summary: Send message to interview candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendInterviewMessage"
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewMessageResponse"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
        - name: assigneeId
          in: query
          schema:
            type: integer
        - name: priority
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTask"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTask"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"

  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List workflows
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Workflows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowList"
    post:
      operationId: createWorkflow
      tags: [workflows]
      summary: Create workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflow"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowItem"

  /workflows/{id}:
    get:
      operationId: getWorkflow
      tags: [workflows]
      summary: Get workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowItem"
    patch:
      operationId: updateWorkflow
      tags: [workflows]
      summary: Update workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkflow"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowItem"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationList"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Start a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversation"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationItem"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"

  /conversations/{id}/messages:
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessage"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List available integrations
      responses:
        "200":
          description: Integrations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationList"

  /integrations/{toolId}/connect:
    post:
      operationId: connectIntegration
      tags: [integrations]
      summary: Connect an integration
      parameters:
        - name: toolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationItem"

  /integrations/{toolId}/disconnect:
    post:
      operationId: disconnectIntegration
      tags: [integrations]
      summary: Disconnect an integration
      parameters:
        - name: toolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationItem"

  /billing/plans:
    get:
      operationId: getBillingPlans
      tags: [billing]
      summary: Get available billing plans with pricing
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPlanList"

  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Get current subscription
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /billing/usage:
    get:
      operationId: getUsageSummary
      tags: [billing]
      summary: Get usage summary
      responses:
        "200":
          description: Usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummary"

  /billing/checkout:
    post:
      operationId: createCheckout
      tags: [billing]
      summary: Create a checkout session for plan upgrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"

  /billing/portal:
    post:
      operationId: createBillingPortal
      tags: [billing]
      summary: Create Stripe billing portal session
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required:
                  - url

  /voices:
    get:
      operationId: listVoices
      tags: [voices]
      summary: List available AI voices
      responses:
        "200":
          description: Voices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceList"

  /voice/synthesize:
    post:
      operationId: synthesizeVoice
      tags: [voice]
      summary: Synthesize text to speech (streamed chunked audio)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceSynthesizeRequest"
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary

  /voice/transcribe:
    post:
      operationId: transcribeAudio
      tags: [voice]
      summary: Transcribe audio to text via Whisper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  description: Base64-encoded audio data
              required:
                - audio
      responses:
        "200":
          description: Transcription result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptionResult"

  /voice/profiles:
    get:
      operationId: getVoiceProfiles
      tags: [voice]
      summary: Get role-based voice profiles
      responses:
        "200":
          description: Voice profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/VoiceProfile"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationItem"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all as read
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /support/tickets:
    get:
      operationId: listTickets
      tags: [support]
      summary: List support tickets
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketList"
    post:
      operationId: createTicket
      tags: [support]
      summary: Create support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicket"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketItem"

  /support/articles:
    get:
      operationId: listArticles
      tags: [support]
      summary: List knowledge base articles
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"

  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [dashboard]
      summary: Analytics overview with charts data
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /avatars/gallery:
    get:
      tags: [Avatars]
      operationId: getAvatarGallery
      summary: Get pre-generated avatar gallery for Quick Select
      parameters:
        - name: roleTitle
          in: query
          schema:
            type: string
          description: Filter gallery by role title (returns matching pre-generated role avatars)
        - name: category
          in: query
          schema:
            type: string
        - name: industry
          in: query
          schema:
            type: string
          description: Filter gallery by industry
      responses:
        "200":
          description: Avatar gallery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarGallery"

  /avatars/branding-presets:
    get:
      tags: [Avatars]
      operationId: getAvatarBrandingPresets
      summary: Get enterprise branding presets for avatar generation
      responses:
        "200":
          description: Branding presets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/BrandingPreset"

  /avatars/generate:
    post:
      tags: [Avatars]
      operationId: generateAvatar
      summary: Generate a custom avatar from parameters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarGenerateRequest"
      responses:
        "200":
          description: Generated avatar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResult"

  /avatars/regenerate/{employeeId}:
    post:
      tags: [Avatars]
      operationId: regenerateAvatar
      summary: Regenerate avatar for an existing employee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarGenerateRequest"
      responses:
        "200":
          description: Regenerated avatar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResult"

components:
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 12

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, limit, total, totalPages]

    Organization:
      type: object
      properties:
        id:
          type: integer
        clerkOrgId:
          type: string
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        timezone:
          type: string
        createdAt:
          type: string
      required: [id, clerkOrgId, name, slug, timezone, createdAt]

    UpdateOrganization:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
        industry:
          type: string
        timezone:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
        createdAt:
          type: string
      required: [id, clerkUserId, email, role, createdAt]

    UserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
