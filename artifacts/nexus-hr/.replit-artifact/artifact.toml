kind = "web"
previewPath = "/"
title = "NexusHR VX"
version = "1.0.0"
id = "artifacts/nexus-hr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24925

[services.development]
run = "pnpm --filter @workspace/nexus-hr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus-hr", "run", "build" ]
publicDir = "artifacts/nexus-hr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24925"
BASE_PATH = "/"
