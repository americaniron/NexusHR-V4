#:schema node_modules/wrangler/config-schema.json
name = "nexushr-v4-api"
main = "dist/index.cjs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Skip wrangler's internal bundling — we pre-build with esbuild
no_bundle = true

# Build command (runs our custom esbuild)
[build]
command = "node build.mjs"

# Non-secret environment variables
[vars]
NODE_ENV = "production"
OWNER_EMAILS = "ahmed@americaniron1.com,adam@americaniron1.com"
FRONTEND_URL = "https://nexushr-v4.pages.dev"

# Hyperdrive binding for PostgreSQL (via Neon)
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "646d982636854f879ce8a034b893e16f"
